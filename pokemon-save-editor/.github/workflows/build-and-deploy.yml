# GitHub Actions Workflow for Building and Deploying Pokémon Save Editor to GitHub Pages
# This workflow automatically builds the project and deploys it to GitHub Pages
# after every commit to the main branch.

name: Build and Deploy to GitHub Pages

# Trigger the workflow on every push to the main branch
on:
  push:
    branches:
      - main
      - master
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job to build the React application
  build:
    name: Build Project
    runs-on: ubuntu-latest
    
    steps:
      # Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      # Install project dependencies
      - name: Install Dependencies
        run: npm ci
      
      # Build the project for production
      - name: Build Project
        run: npm run build
      
      # Upload build artifacts for deployment
      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
  
  # Job to deploy to GitHub Pages
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
